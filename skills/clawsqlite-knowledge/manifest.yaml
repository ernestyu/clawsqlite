name: clawsqlite-knowledge
version: 1.0.10
description: Knowledge base skill that uses the published clawsqlite CLI for ingest, search, show, and maintenance workflows.
entry: SKILL.md
tags:
  - knowledge
  - sqlite
  - search
  - cli
requires:
  bins:
    - python
  env: []
dependencies:
  python:
    - clawsqlite==1.0.10
install:
  - id: clawsqlite_knowledge_bootstrap
    kind: bash
    label: Install clawsqlite Python package from PyPI
    script: set -e && cd {baseDir} && bash bootstrap_deps.sh
metadata:
  openclaw:
    homepage: https://github.com/ernestyu/clawsqlite
